name: Release

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      tag_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build from
        required: true
        type: string
      tag_name:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_REF: ${{ inputs.ref || github.ref_name }}
  RELEASE_TAG: ${{ inputs.tag_name || github.ref_name }}

jobs:
  python-dist:
    name: Python Dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build sdist and wheel
        run: ./scripts/check.sh build

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  linux-package:
    name: Linux Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libportaudio2 xdotool xclip libnotify-bin

      - name: Install package dependencies
        run: pip install -e ".[linux,packaging]"

      - name: Build Linux release assets
        run: ./scripts/build-linux-package.sh

      - name: Smoke packaged executable
        run: ./dist/dicton/dicton --version

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: |
            dist/dicton-linux-x64.tar.gz
            dist/dicton_*_amd64.deb

  windows-package:
    name: Windows Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package dependencies
        shell: bash
        run: pip install -e ".[windows,context-windows,notifications,llm,configui,mistral,packaging]"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer and portable bundle
        shell: powershell
        run: .\scripts\build-windows.ps1

      - name: Smoke packaged executable
        shell: powershell
        run: .\dist\dicton\dicton-cli.exe --version

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: |
            dist/DictonSetup-*-x64.exe
            dist/dicton-windows-portable-x64.zip

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [python-dist, linux-package, windows-package]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release-artifacts/python-dist/*
            release-artifacts/linux-package/*
            release-artifacts/windows-package/*
