name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run lint checks
        run: ./scripts/check.sh lint

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: ./scripts/check.sh test --cov=dicton --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Run build
        run: ./scripts/check.sh build

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Install macOS system dependencies
        if: matrix.os == 'macos-latest'
        run: brew install portaudio

      - name: Install package
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              pip install -e ".[dev]"
              ;;
            windows-latest)
              pip install -e ".[dev,windows,context-windows,notifications]"
              ;;
            macos-latest)
              pip install -e ".[dev,notifications]"
              ;;
          esac

      - name: Run smoke checks
        run: |
          python -c "import dicton; print(dicton.__version__)"
          python -m dicton --version

  windows-package:
    name: Windows Package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package dependencies
        shell: bash
        run: pip install -e ".[windows,context-windows,notifications,llm,configui,mistral,packaging]"

      - name: Build Windows bundle
        shell: powershell
        run: .\scripts\build-windows.ps1

      - name: Smoke packaged executable
        shell: powershell
        run: .\dist\dicton\dicton.exe --version

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: dicton-windows-x64
          path: dist/dicton-windows-x64.zip

  linux-package:
    name: Linux Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libportaudio2 xdotool xclip libnotify-bin

      - name: Install package dependencies
        run: pip install -e ".[linux,packaging]"

      - name: Build Linux package assets
        run: ./scripts/build-linux-package.sh

      - name: Smoke packaged executable
        run: ./dist/dicton/dicton --version

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: dicton-linux-x64
          path: |
            dist/dicton-linux-x64.tar.gz
            dist/dicton_*_amd64.deb
